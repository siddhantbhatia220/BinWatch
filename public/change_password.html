<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - BinWatch</title>
    <link rel="stylesheet" href="css/iot.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <form class="auth-form" id="change-password-form">
            <h2>Change Password</h2>
            <div class="form-group">
                <label for="currentPassword">Current Password</label>
                <input type="password" id="currentPassword" required>
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required>
            </div>
            <div class="form-group">
                <label for="confirmNewPassword">Confirm New Password</label>
                <input type="password" id="confirmNewPassword" required>
            </div>
            <button type="submit" class="auth-button">Update Password</button>
            <p class="auth-link"><a href="index.html">&larr; Back to Dashboard</a></p>
        </form>
    </div>
    
    <script src="js/auth.js" defer></script>
</body>
</html>
