<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BinWatch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        emerald: {
                            400: '#34d399',
                            500: '#10b981',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', "Liberation Mono", "Courier New", 'monospace'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .bg-grid {
            background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 72px 72px;
        }

        .glass-card {
            background: rgba(17, 17, 19, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body class="antialiased selection:bg-emerald-500/30">
    <!-- Subtle grid -->
    <div class="absolute inset-0 bg-grid opacity-[0.5] pointer-events-none"></div>
    <!-- Radial glow -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-emerald-500/[0.04] rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md p-6 relative z-10">
        <div class="glass-card p-8">
            <div class="text-center mb-8">
                <div class="w-12 h-12 mx-auto rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center mb-4">
                    <i class="fas fa-user-plus text-emerald-400 text-xl"></i>
                </div>
                <h2 class="text-2xl font-bold text-white tracking-tight">Create Account</h2>
                <p class="text-sm text-zinc-400 mt-2">Join the BinWatch IoT network</p>
            </div>

            <form id="register-form" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-zinc-300 mb-1.5">Email address</label>
                    <input type="email" id="email" required 
                           class="w-full px-4 py-3 bg-black/40 border border-white/10 rounded-lg focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/50 text-white placeholder-zinc-600 transition-all text-sm" 
                           placeholder="admin@city.gov">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-zinc-300 mb-1.5">Password</label>
                    <input type="password" id="password" required 
                           class="w-full px-4 py-3 bg-black/40 border border-white/10 rounded-lg focus:outline-none focus:border-emerald-500/50 focus:ring-1 focus:ring-emerald-500/50 text-white placeholder-zinc-600 transition-all text-sm" 
                           placeholder="Create a strong password">
                </div>

                <button type="submit" 
                        class="w-full py-3 px-4 bg-emerald-500 hover:bg-emerald-400 text-black font-semibold rounded-lg transition-colors text-sm mt-2 flex items-center justify-center gap-2 group">
                    Register <i class="fas fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
                </button>

                <p class="text-center text-sm text-zinc-400 mt-6">
                    Already have an account? <a href="login.html" class="text-emerald-400 hover:text-emerald-300 font-medium transition-colors">Sign In</a>
                </p>
                <div class="text-center mt-4">
                    <a href="index.html" class="text-xs text-zinc-600 hover:text-zinc-400 transition-colors">&larr; Back to Home</a>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/auth.js" defer></script>
</body>
</html>
